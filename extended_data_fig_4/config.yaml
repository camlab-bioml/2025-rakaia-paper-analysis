projects:
  - patient1 # Informs the snakemake pipeline which projects to process

seed: 123L
hpf: 1 

nuclear: "Ir191 Ir193"
cytoplasm: "In113 In115"

deepcell_app: "mesmer"
deepcell_model: "MultiplexSegmentation"
deepcell_modelpath: "/opt/keras/models"
deepcell_pxsize: 1
aggr: "mean" # Aggregation of signal. Can be either of these [mean|median]
neighbor_type: "borders" # Consideration of each neighbor
dmax: 15
kmax: 5

phenograph_k: 30
phenograph_min_cluster_size: 10

channels_ignore_umap: "ArAr80 Xe131 Xe134 Ba136 La138 Pt196 Pb206 Pb208"

quantify_nuclei: True